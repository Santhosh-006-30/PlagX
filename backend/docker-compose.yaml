version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=plagx
    ports:
      - "5432:5432"

  api:
    build: .
    volumes:
      - .:/app
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/plagx
      - SECRET_KEY=your_secret_key_here
      - DEBUG=True
    depends_on:
      - db

volumes:
  postgres_data:
